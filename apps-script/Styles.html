<style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a1f;
            --secondary: #1a1a3a;
            --accent: #4f46e5;
            --accent-soft: #6366f1;
            --accent-glow: rgba(79, 70, 229, 0.6);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-start: #4f46e5;
            --gradient-end: #7c3aed;
            --gradient-alt: #db2777;
            --bg-deep: #050510;
            --bg-surface: rgba(20, 20, 40, 0.8);
            --bg-surface-hover: rgba(30, 30, 50, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-tertiary: #6b6b8b;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(79, 70, 229, 0.3);
            --shadow-ambient: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(79, 70, 229, 0.3);
            --shadow-inner: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Hyperdimensional Background */
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            animation: starField 60s linear infinite;
        }

        .stars::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 90px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 240px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 300px 250px, var(--accent-soft), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 380px 320px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 450px 400px, var(--gradient-end), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 520px 470px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 600px 550px, var(--accent), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 800px 800px;
            opacity: 0.5;
            animation: starDrift 120s linear infinite;
        }

        .nebula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(219, 39, 119, 0.1) 0%, transparent 50%);
            filter: blur(60px);
            animation: nebulaPulse 15s ease-in-out infinite alternate;
        }

        @keyframes starField {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes starDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-200px, -200px); }
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Quantum Noise */
        .quantum-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='8' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
            animation: orbFloat 20s infinite alternate;
        }

        .orb-1 {
            top: 10%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: rgba(79, 70, 229, 0.2);
            animation-duration: 25s;
        }

        .orb-2 {
            bottom: 10%;
            right: 10%;
            width: 500px;
            height: 500px;
            background: rgba(124, 58, 237, 0.15);
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: rgba(219, 39, 119, 0.1);
            animation-duration: 35s;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -100px) scale(1.2); }
        }

        /* Main Container */
        .cosmic-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Quantum Header */
        .quantum-header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
        }

        .hologram-badge {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: rgba(79, 70, 229, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(79, 70, 229, 0.3);
            padding: 0.75rem 2rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: badgePulse 3s infinite;
        }

        .hologram-badge::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(79, 70, 229, 0.3), transparent);
            animation: hologramRotate 4s linear infinite;
        }

        .badge-text {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #a0a0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .quantum-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
            animation: quantumBlink 1.5s infinite;
        }

        @keyframes quantumBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        @keyframes hologramRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quantum-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .glitch-text {
            position: relative;
            color: white;
            text-shadow: 
                0.05em 0 0 rgba(255, 0, 0, 0.75),
                -0.025em -0.05em 0 rgba(0, 255, 255, 0.75),
                0.025em 0.05em 0 rgba(0, 255, 0, 0.75);
            animation: glitch 500ms infinite;
        }

        .glitch-text span {
            position: absolute;
            top: 0;
            left: 0;
        }

        .glitch-text span:first-child {
            animation: glitch-1 1s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            opacity: 0.8;
        }

        .glitch-text span:last-child {
            animation: glitch-2 1s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            transform: translate(0.0125em, 0.025em);
            opacity: 0.8;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); }
            5% { transform: skew(5deg, 0deg); }
            10% { transform: skew(-5deg, 0deg); }
            15% { transform: skew(3deg, 0deg); }
            20% { transform: skew(-3deg, 0deg); }
            25% { transform: skew(0deg, 0deg); }
        }

        .quantum-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #a0a0c0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Grid - Quantum Entanglement */
        .quantum-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 2rem;
            align-items: start;
            position: relative;
        }

        @media (max-width: 1200px) {
            .quantum-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Hyperdimensional Cards */
        .dimensional-card {
            background: var(--bg-surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-ambient), var(--shadow-inner);
        }

        .dimensional-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(79, 70, 229, 0.3),
                transparent 70%);
            border-radius: 34px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .dimensional-card:hover::before {
            opacity: 1;
            animation: borderRotate 3s linear infinite;
        }

        .dimensional-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--accent), 
                var(--gradient-end), 
                var(--gradient-alt), 
                transparent);
            transform: translateX(-100%);
            transition: transform 0.8s;
        }

        .dimensional-card:hover::after {
            transform: translateX(100%);
        }

        .dimensional-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(79, 70, 229, 0.5);
            box-shadow: var(--shadow-glow), var(--shadow-ambient);
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Section Headers */
        .quantum-section-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .quantum-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -5px var(--accent-glow);
            animation: iconPulse 3s infinite;
        }

        .quantum-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.3), transparent);
            animation: iconRotate 4s linear infinite;
        }

        @keyframes iconRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .quantum-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .quantum-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Quantum Select */
        .quantum-select {
            position: relative;
            margin-bottom: 2rem;
        }

        .quantum-select select {
            width: 100%;
            padding: 1.25rem 2rem;
            background: rgba(10, 10, 30, 0.6);
            border: 2px solid var(--border-subtle);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            appearance: none;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 2;
            letter-spacing: 0.5px;
        }

        .quantum-select select:hover, .quantum-select select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            background: rgba(10, 10, 30, 0.8);
            transform: scale(1.02);
        }

        .select-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            background: radial-gradient(circle at 50% 50%, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .quantum-select:hover .select-glow {
            opacity: 0.3;
        }

        .quantum-select::after {
            content: '⏷';
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 3;
            transition: transform 0.3s;
        }

        .quantum-select:hover::after {
            transform: translateY(-50%) rotate(180deg);
        }

        /* Quantum Radio */
        .quantum-radio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .quantum-radio {
            position: relative;
            cursor: pointer;
        }

        .quantum-radio input {
            position: absolute;
            opacity: 0;
        }

        .radio-dimension {
            padding: 1.25rem 1rem;
            background: rgba(10, 10, 30, 0.4);
            border: 2px solid var(--border-subtle);
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .radio-dimension::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            animation: radioSpin 3s linear infinite;
        }

        .quantum-radio:hover .radio-dimension {
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .quantum-radio input:checked + .radio-dimension {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.15);
            box-shadow: 0 0 40px var(--accent-glow);
            animation: radioPulse 2s infinite;
        }

        .quantum-radio input:checked + .radio-dimension::after {
            content: '✓';
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--accent);
            animation: checkPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes radioPulse {
            0%, 100% { box-shadow: 0 0 40px var(--accent-glow); }
            50% { box-shadow: 0 0 60px var(--accent-glow); }
        }

        @keyframes checkPop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Quantum Checkboxes */
        .quantum-check-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .quantum-check {
            position: relative;
            cursor: pointer;
        }

        .quantum-check input {
            position: absolute;
            opacity: 0;
        }

        .check-dimension {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            background: rgba(10, 10, 30, 0.4);
            border: 2px solid var(--border-subtle);
            border-radius: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .check-icon {
            width: 48px;
            height: 48px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .check-info {
            flex: 1;
        }

        .check-title {
            font-weight: 600;
            font-size: 1rem;
            display: block;
            margin-bottom: 0.25rem;
        }

        .check-desc {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .check-price {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            background: rgba(79, 70, 229, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
        }

        .quantum-check:hover .check-dimension {
            border-color: var(--accent);
            transform: scale(1.02) translateX(5px);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .quantum-check input:checked + .check-dimension {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.15);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .quantum-check input:checked + .check-dimension .check-icon {
            background: var(--accent);
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px var(--accent);
        }

        /* Result Card - Quantum Core */
        .quantum-core {
            position: sticky;
            top: 2rem;
            background: linear-gradient(145deg, 
                rgba(20, 20, 40, 0.95), 
                rgba(10, 10, 30, 0.95));
            border: 1px solid rgba(79, 70, 229, 0.3);
            overflow: hidden;
        }

        .core-header {
            text-align: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(79, 70, 229, 0.2);
            margin-bottom: 2rem;
            position: relative;
        }

        .core-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--accent), 
                var(--gradient-end), 
                var(--gradient-alt), 
                transparent);
            animation: coreWave 3s ease-in-out infinite;
        }

        @keyframes coreWave {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .core-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.5rem;
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid rgba(79, 70, 229, 0.4);
            border-radius: 50px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            animation: badgeFloat 3s infinite;
        }

        @keyframes badgeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .quantum-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0a0c0, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin: 1rem 0;
            position: relative;
            display: inline-block;
            animation: priceGlow 3s infinite;
        }

        @keyframes priceGlow {
            0%, 100% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 40px var(--accent-glow)); }
        }

        .price-dimension {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .dimension-option {
            flex: 1;
            text-align: center;
            padding: 1.25rem;
            background: rgba(10, 10, 30, 0.6);
            border: 2px solid var(--border-subtle);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .dimension-option:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px var(--accent-glow);
        }

        .dimension-option.active {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.15);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .dimension-option.minimal.active { border-color: var(--success); background: rgba(16, 185, 129, 0.15); }
        .dimension-option.premium.active { border-color: var(--warning); background: rgba(245, 158, 11, 0.15); }

        .option-glow {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .dimension-option:hover .option-glow {
            opacity: 0.2;
        }

        /* Quantum Commission */
        .quantum-commission {
            background: linear-gradient(145deg, 
                rgba(16, 185, 129, 0.1), 
                rgba(16, 185, 129, 0.05));
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 28px;
            padding: 1.75rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: commissionPulse 4s infinite;
        }

        .quantum-commission::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(16, 185, 129, 0.3), transparent);
            animation: commissionSpin 8s linear infinite;
        }

        @keyframes commissionSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .commission-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .commission-icon {
            width: 56px;
            height: 56px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            position: relative;
            overflow: hidden;
        }

        .commission-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
