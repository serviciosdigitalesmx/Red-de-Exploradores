<style>
:root {

* {

}

body {

}

.bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.bg-animation::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(99, 102, 241, 0.2) 0%, transparent 40%);
    animation: bgMove 20s ease-in-out infinite;
}

@keyframes bgMove {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
}

.noise {

    top: 0;
    left: 0;

    height: 100%;

    z-index: -1;

}

.container {

}

.header {

}

.badge-pulse {

}

@keyframes pulse {

.pulse-dot {

}

@keyframes blink {

.header h1 {

.section-subtitle {

}

.form-group {

}

.form-label {

.custom-select {

.custom-select select {

}

.radio-card input:checked + .radio-content {

}

.radio-card input:checked + .radio-content::after {

}

.option-price {

}

.commission-box {

}

.shape {

    opacity: 0.1;

}

.shape-1 {
    top: 20%;
    left: 10%;
    width: 100px;
    height: 100px;
    background: var(--accent);
    border-radius: 50%;

}

.shape-2 {
    top: 60%;
    right: 10%;

}

.shape-3 {

@keyframes float {

.tooltip:hover::after {
